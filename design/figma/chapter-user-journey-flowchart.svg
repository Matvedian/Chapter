<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="5200" height="1500" viewBox="0 0 5200 1500" fill="none">
  <defs>
    <style>
      .title { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 700; fill: #1c1917; }
      .heading { font-family: Inter, sans-serif; font-weight: 600; fill: #1c1917; }
      .body { font-family: Inter, sans-serif; font-weight: 400; fill: #44403c; }
      .caption { font-family: Inter, sans-serif; font-weight: 500; fill: #78716c; }
      .label { font-family: Inter, sans-serif; font-weight: 600; fill: #a8a29e; font-size: 11px; letter-spacing: 0.06em; }
      .node-text { font-family: Inter, sans-serif; font-weight: 600; fill: #1c1917; font-size: 14px; }
      .node-sub { font-family: Inter, sans-serif; font-weight: 400; fill: #78716c; font-size: 11px; }
      .arrow { stroke: #a8a29e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-brand { stroke: #f59e0b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-brand); }
      .arrow-danger { stroke: #ef4444; stroke-width: 2; fill: none; marker-end: url(#arrowhead-danger); stroke-dasharray: 6 4; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a8a29e"/>
    </marker>
    <marker id="arrowhead-brand" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-danger" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1c1917" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="5200" height="1500" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="52" class="title" font-size="32">Chapter � User Journey Flowchart</text>
  <text x="60" y="82" class="caption" font-size="15">Horizontal happy path (left ? right) � branches above / below main lane</text>
  <rect x="60" y="94" width="72" height="4" rx="2" fill="#fbbf24"/>

  <!-- Legend -->
  <g transform="translate(60, 112)">
    <rect width="1200" height="48" rx="10" fill="#ffffff" stroke="#e7e5e4" filter="url(#shadow)"/>
    <rect x="16" y="16" width="14" height="14" rx="3" fill="#fef3c7" stroke="#fbbf24"/>
    <text x="36" y="27" class="caption" font-size="12">Setup</text>
    <rect x="100" y="16" width="14" height="14" rx="3" fill="#fbbf24"/>
    <text x="120" y="27" class="caption" font-size="12">Core loop</text>
    <rect x="220" y="16" width="14" height="14" rx="3" fill="#1c1917"/>
    <text x="240" y="27" class="caption" font-size="12">Verify gate</text>
    <rect x="350" y="16" width="14" height="14" rx="3" fill="#ffffff" stroke="#e7e5e4"/>
    <text x="370" y="27" class="caption" font-size="12">Ongoing</text>
    <polygon points="460,23 472,16 484,23 472,30" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="494" y="27" class="caption" font-size="12">Decision</text>
    <line x1="580" y1="23" x2="610" y2="23" class="arrow-danger"/>
    <text x="618" y="27" class="caption" font-size="12">Safety / exit</text>
  </g>

  <!-- ???????????????????????????????????????????????????????????
       MAIN HORIZONTAL FLOW  (lane Y ? 420)
       ??????????????????????????????????????????????????????????? -->
  <g id="flow" transform="translate(0, 180)">

    <!-- Lane guide -->
    <line x1="40" y1="420" x2="5040" y2="420" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="8 6"/>

    <!-- 1 START -->
    <ellipse cx="100" cy="420" rx="56" ry="36" fill="#1c1917"/>
    <text x="100" y="426" text-anchor="middle" fill="#fafaf9" font-family="Inter,sans-serif" font-weight="600" font-size="13">START</text>
    <line x1="156" y1="420" x2="188" y2="420" class="arrow"/>

    <!-- 2 Install -->
    <g transform="translate(188, 372)">
      <rect width="168" height="96" rx="12" fill="#fef3c7" stroke="#fbbf24" filter="url(#shadow)"/>
      <text x="84" y="36" text-anchor="middle" class="node-text">Install</text>
      <text x="84" y="54" text-anchor="middle" class="node-sub">App Store</text>
      <text x="84" y="70" text-anchor="middle" class="node-sub">Splash</text>
    </g>
    <line x1="356" y1="420" x2="388" y2="420" class="arrow"/>

    <!-- 3 Auth -->
    <g transform="translate(388, 364)">
      <rect width="180" height="112" rx="12" fill="#fef3c7" stroke="#fbbf24" filter="url(#shadow)"/>
      <text x="90" y="36" text-anchor="middle" class="node-text">Login / Register</text>
      <text x="90" y="56" text-anchor="middle" class="node-sub">/login � /register</text>
      <text x="90" y="72" text-anchor="middle" class="node-sub">Supabase Auth</text>
    </g>
    <line x1="568" y1="420" x2="600" y2="420" class="arrow"/>

    <!-- 4 Session? -->
    <g transform="translate(600, 388)">
      <polygon points="52,0 104,32 52,64 0,32" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="52" y="28" text-anchor="middle" class="node-text" font-size="12">Session</text>
      <text x="52" y="44" text-anchor="middle" class="node-text" font-size="12">valid?</text>
    </g>
    <!-- No loop back up -->
    <path d="M 652 388 L 652 300 L 478 300 L 478 364" class="arrow" fill="none"/>
    <text x="560" y="290" class="caption" font-size="11">No</text>
    <line x1="704" y1="420" x2="736" y2="420" class="arrow"/>
    <text x="718" y="410" class="caption" font-size="11">Yes</text>

    <!-- 5 Onboarding -->
    <g transform="translate(736, 352)">
      <rect width="220" height="136" rx="12" fill="#fef3c7" stroke="#fbbf24" filter="url(#shadow)"/>
      <text x="110" y="32" text-anchor="middle" class="node-text">Onboarding</text>
      <text x="110" y="52" text-anchor="middle" class="node-sub">Info ? Photos</text>
      <text x="110" y="68" text-anchor="middle" class="node-sub">Genres ? Books</text>
      <text x="110" y="88" text-anchor="middle" class="node-sub">4 steps � progress bar</text>
      <text x="110" y="108" text-anchor="middle" class="node-sub">onboarding_complete</text>
    </g>
    <!-- Under 18 branch down -->
    <path d="M 846 488 L 846 560 L 110 560 L 110 468" class="arrow-danger" fill="none"/>
    <g transform="translate(760, 568)">
      <rect width="172" height="52" rx="10" fill="#fef2f2" stroke="#ef4444"/>
      <text x="86" y="22" text-anchor="middle" class="node-text" font-size="12" fill="#b91c1c">Under 18</text>
      <text x="86" y="38" text-anchor="middle" class="node-sub" fill="#b91c1c">Blocked at Info</text>
    </g>
    <line x1="956" y1="420" x2="988" y2="420" class="arrow"/>

    <!-- 6 Verify -->
    <g transform="translate(988, 352)">
      <rect width="200" height="136" rx="12" fill="#1c1917" filter="url(#shadow)"/>
      <text x="100" y="32" text-anchor="middle" class="node-text" fill="#fafaf9">Verify</text>
      <text x="100" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#a8a29e">Stripe ID</text>
      <text x="100" y="68" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#a8a29e">chapter://verify</text>
      <text x="100" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#a8a29e">Poll verified</text>
      <text x="100" y="108" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#a8a29e">identity_verified</text>
    </g>
    <line x1="1188" y1="420" x2="1220" y2="420" class="arrow-brand"/>

    <!-- 7 Discover -->
    <g transform="translate(1220, 340)">
