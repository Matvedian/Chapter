    <line x1="1480" y1="420" x2="1512" y2="420" class="arrow-brand"/>

    <!-- 8 Mutual like? -->
    <g transform="translate(1512, 388)">
      <polygon points="52,0 104,32 52,64 0,32" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="52" y="28" text-anchor="middle" class="node-text" font-size="12">Mutual</text>
      <text x="52" y="44" text-anchor="middle" class="node-text" font-size="12">like?</text>
    </g>
    <path d="M 1564 388 L 1564 260 L 1480 260 L 1480 340" class="arrow" fill="none"/>
    <text x="1574" y="278" class="caption" font-size="11">No ? deck</text>
    <line x1="1616" y1="420" x2="1648" y2="420" class="arrow-brand"/>
    <text x="1628" y="410" class="caption" font-size="11">Yes</text>

    <!-- 9 Match -->
    <g transform="translate(1648, 372)">
      <rect width="168" height="96" rx="12" fill="#fbbf24" stroke="#f59e0b" filter="url(#shadow)"/>
      <text x="84" y="36" text-anchor="middle" class="node-text">Match</text>
      <text x="84" y="54" text-anchor="middle" class="node-sub">Modal + haptic</text>
      <text x="84" y="70" text-anchor="middle" class="node-sub">Toast elsewhere</text>
    </g>
    <line x1="1816" y1="420" x2="1848" y2="420" class="arrow-brand"/>

    <!-- 10 Chat -->
    <g transform="translate(1848, 352)">
      <rect width="200" height="136" rx="12" fill="#fbbf24" stroke="#f59e0b" filter="url(#shadow)"/>
      <text x="100" y="32" text-anchor="middle" class="node-text">Chat</text>
      <text x="100" y="52" text-anchor="middle" class="node-sub">/chat/:id</text>
      <text x="100" y="68" text-anchor="middle" class="node-sub">Realtime � typing</text>
      <text x="100" y="88" text-anchor="middle" class="node-sub">Enter to send</text>
    </g>
    <!-- Safety below chat -->
    <g transform="translate(1848, 540)">
      <rect width="64" height="44" rx="8" fill="#fef2f2" stroke="#ef4444"/>
      <text x="32" y="28" text-anchor="middle" class="node-text" font-size="10" fill="#b91c1c">Report</text>
    </g>
    <g transform="translate(1920, 540)">
      <rect width="64" height="44" rx="8" fill="#fef2f2" stroke="#ef4444"/>
      <text x="32" y="28" text-anchor="middle" class="node-text" font-size="10" fill="#b91c1c">Block</text>
    </g>
    <g transform="translate(1992, 540)">
      <rect width="64" height="44" rx="8" fill="#fef2f2" stroke="#ef4444"/>
      <text x="32" y="28" text-anchor="middle" class="node-text" font-size="10" fill="#b91c1c">Unmatch</text>
    </g>
    <line x1="1948" y1="488" x2="1948" y2="540" class="arrow-danger"/>

    <line x1="2048" y1="420" x2="2080" y2="420" class="arrow"/>

    <!-- 11 Matches -->
    <g transform="translate(2080, 372)">
