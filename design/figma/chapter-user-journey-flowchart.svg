      <text x="90" y="36" text-anchor="middle" class="node-text">Matches</text>
      <text x="90" y="54" text-anchor="middle" class="node-sub">/matches � search</text>
      <text x="90" y="70" text-anchor="middle" class="node-sub">Unread badge</text>
    </g>
    <line x1="2260" y1="420" x2="2292" y2="420" class="arrow"/>

    <!-- 12 Bottom Nav hub -->
    <g transform="translate(2292, 348)">
      <rect width="320" height="144" rx="14" fill="#ffffff" stroke="#e7e5e4" filter="url(#shadow)"/>
      <text x="160" y="28" text-anchor="middle" class="label">BOTTOM NAV � ONGOING LOOPS</text>
      <text x="48" y="58" text-anchor="middle" class="node-text" font-size="12">Discover</text>
      <text x="128" y="58" text-anchor="middle" class="node-text" font-size="12">Matches</text>
      <text x="208" y="58" text-anchor="middle" class="node-text" font-size="12">Library</text>
      <text x="288" y="58" text-anchor="middle" class="node-text" font-size="12">Profile</text>
      <line x1="20" y1="72" x2="300" y2="72" stroke="#e7e5e4"/>
      <text x="48" y="96" text-anchor="middle" class="node-sub">Swipe deck</text>
      <text x="128" y="96" text-anchor="middle" class="node-sub">Chat list</text>
      <text x="208" y="96" text-anchor="middle" class="node-sub">Shelves � ratings</text>
      <text x="288" y="96" text-anchor="middle" class="node-sub">Edit � pause</text>
      <text x="160" y="124" text-anchor="middle" class="node-sub">NotificationListener � OfflineBanner � Toasts</text>
    </g>

    <!-- Loop back to Discover -->
    <path d="M 2452 492 L 2452 640 L 1350 640 L 1350 500" class="arrow-brand" fill="none"/>
    <text x="1900" y="660" class="caption" font-size="12">Return loop ? Discover / Matches / Library</text>

    <!-- Profile exit branches -->
    <g transform="translate(2520, 540)">
      <rect width="120" height="52" rx="10" fill="#fef2f2" stroke="#ef4444"/>
      <text x="60" y="22" text-anchor="middle" class="node-text" font-size="11" fill="#b91c1c">Pause</text>
      <text x="60" y="38" text-anchor="middle" class="node-sub" fill="#b91c1c">Hidden from deck</text>
    </g>
    <g transform="translate(2660, 540)">
      <rect width="120" height="52" rx="10" fill="#fef2f2" stroke="#ef4444"/>
      <text x="60" y="22" text-anchor="middle" class="node-text" font-size="11" fill="#b91c1c">Delete</text>
      <text x="60" y="38" text-anchor="middle" class="node-sub" fill="#b91c1c">Edge fn � exit</text>
    </g>
    <line x1="2612" y1="492" x2="2580" y2="540" class="arrow-danger"/>
    <line x1="2720" y1="492" x2="2720" y2="540" class="arrow-danger"/>

    <line x1="2612" y1="420" x2="2820" y2="420" class="arrow"/>

    <!-- 13 Retention -->
    <g transform="translate(2820, 372)">
      <rect width="200" height="96" rx="12" fill="#ffffff" stroke="#e7e5e4" filter="url(#shadow)"/>
      <text x="100" y="36" text-anchor="middle" class="node-text">Retention</text>
      <text x="100" y="54" text-anchor="middle" class="node-sub">Toast ? chat</text>
      <text x="100" y="70" text-anchor="middle" class="node-sub">Daily return</text>
    </g>
    <line x1="3020" y1="420" x2="3052" y2="420" class="arrow"/>

    <!-- END -->
    <ellipse cx="3120" cy="420" rx="68" ry="36" fill="#1c1917"/>
    <text x="3120" y="418" text-anchor="middle" fill="#fafaf9" font-family="Inter,sans-serif" font-weight="600" font-size="12">CHURN /</text>
    <text x="3120" y="434" text-anchor="middle" fill="#fafaf9" font-family="Inter,sans-serif" font-weight="600" font-size="12">EXIT</text>

    <!-- Auth chain annotation -->
    <g transform="translate(60, 640)">
      <rect width="3040" height="56" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
      <text x="20" y="24" class="label">AUTH CHAIN</text>
      <text x="20" y="44" class="body" font-size="13">session ? profile load ? onboarding_complete? ? identity_verified? ? main app � AuthGuard spinner on load</text>
    </g>
  </g>

  <!-- ??? COMPETITIVE STRIP (horizontal) ??? -->
  <g id="competitive" transform="translate(60, 900)">
    <text x="0" y="0" class="heading" font-size="20">Competitive patterns ? Chapter opportunities</text>

    <g transform="translate(0, 24)">
      <!-- Tinder -->
      <rect width="1180" height="88" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
      <text x="16" y="28" class="heading" font-size="13">Tinder</text>
      <text x="100" y="24" class="body" font-size="12">Fast onboarding � 1 prompt/screen � swipe tutorial early</text>
      <text x="100" y="44" class="node-sub">? Chapter: taste preview before verify; don�t block curiosity</text>
      <text x="100" y="64" class="node-sub">? Keep swipe speed; add book-like (Hinge-style) not just photo swipe</text>

      <!-- Hinge -->
      <g transform="translate(1200, 0)">
        <rect width="1180" height="88" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
        <text x="16" y="28" class="heading" font-size="13">Hinge</text>
        <text x="100" y="24" class="body" font-size="12">Deep profile � prompts � comment-to-like</text>
        <text x="100" y="44" class="node-sub">? Chapter: reading prompts + like-a-book with note</text>
        <text x="100" y="64" class="node-sub">? Label onboarding steps clearly (avoid Hinge�s interrupted flow)</text>
      </g>

      <!-- Bumble -->
      <g transform="translate(2400, 0)">
        <rect width="1180" height="88" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
        <text x="16" y="28" class="heading" font-size="13">Bumble</text>
        <text x="100" y="24" class="body" font-size="12">Pose selfie verify � Opening Moves � safety brand</text>
        <text x="100" y="44" class="node-sub">? Chapter: verified badge on cards; explain Stripe before browser</text>
        <text x="100" y="64" class="node-sub">? Defer push notifications until after first match</text>
      </g>

      <!-- Feeld + Chapter -->
      <g transform="translate(0, 104)">
        <rect width="2380" height="88" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
        <text x="16" y="28" class="heading" font-size="13">Feeld</text>
        <text x="100" y="24" class="body" font-size="12">Desires � intent transparency � partner linking</text>
        <text x="100" y="44" class="node-sub">? Chapter: reading intent tags � currently reading � audiobook vs print</text>
        <text x="100" y="64" class="node-sub">? Library tab = living profile (unique moat none of them have)</text>
      </g>

      <g transform="translate(2400, 104)">
        <rect width="1180" height="88" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
        <text x="16" y="28" class="heading" font-size="13">Chapter moat</text>
        <text x="130" y="24" class="body" font-size="12">Books�3 + genres�1 scoring � Library shelves � BookDetail everywhere</text>
        <text x="130" y="44" class="node-sub">Strongest verify (Stripe) � soften UX, not the gate itself</text>
        <text x="130" y="64" class="node-sub">Skip: 58-screen onboarding � swipe-only shallow profiles</text>
