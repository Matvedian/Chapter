  <!-- Phase labels along top -->
  <g transform="translate(60, 200)" class="caption" font-size="10" fill="#a8a29e">
    <text x="128" y="0">ACQUIRE</text>
    <text x="488" y="0">AUTH</text>
    <text x="800" y="0">ONBOARD</text>
    <text x="1040" y="0">TRUST</text>
    <text x="1320" y="0">CORE LOOP</text>
    <text x="2100" y="0">CONNECT</text>
    <text x="2480" y="0">RETAIN</text>
  </g>
</svg>
