      <text x="130" y="36" text-anchor="middle" class="node-text">Discover</text>
      <text x="130" y="56" text-anchor="middle" class="node-sub">Swipe deck � /</text>
      <text x="130" y="72" text-anchor="middle" class="node-sub">get_candidates score</text>
      <text x="130" y="88" text-anchor="middle" class="node-sub">books�3 + genres�1</text>
      <text x="130" y="108" text-anchor="middle" class="node-sub">Filters � profile modal</text>
      <text x="130" y="128" text-anchor="middle" class="node-sub">Pass re-surface 30d</text>
    </g>

    <!-- Pass / Like above Discover -->
    <g transform="translate(1260, 200)">
      <rect width="88" height="56" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
      <text x="44" y="26" text-anchor="middle" class="node-text" font-size="12">Pass</text>
      <text x="44" y="42" text-anchor="middle" class="node-sub">Light haptic</text>
    </g>
    <g transform="translate(1368, 200)">
      <rect width="88" height="56" rx="10" fill="#fef3c7" stroke="#fbbf24"/>
      <text x="44" y="26" text-anchor="middle" class="node-text" font-size="12">Like</text>
      <text x="44" y="42" text-anchor="middle" class="node-sub">Med haptic</text>
